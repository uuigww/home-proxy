# GoReleaser config — full pipeline wired in M6.
# https://goreleaser.com
version: 2

project_name: home-proxy

before:
  hooks:
    - go mod tidy

builds:
  - id: home-proxy
    main: ./cmd/home-proxy
    binary: home-proxy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/uuigww/home-proxy/internal/version.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [ "tar.gz" ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [ "zip" ]
    files:
      - LICENSE
      - README.md
      - scripts/install.sh
      - deploy/home-proxy.service

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: uuigww
    name: home-proxy
  draft: false
  prerelease: auto
