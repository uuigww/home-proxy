[help]
title = "ℹ️ Справка"
body = """
home-proxy управляет VLESS+Reality и SOCKS5 прямо из Telegram.

• Все действия — в одном сообщении.
• Лимиты и статистика обновляются автоматически.
• Критические уведомления приходят в любое время суток."""

