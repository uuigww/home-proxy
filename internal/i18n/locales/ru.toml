# Russian UI strings for the home-proxy Telegram bot.
# Keys are flat and namespaced (menu.*, wizard.*, err.*, notif.*) for grep-ability.
# Nested TOML tables are flattened into dot-paths by internal/i18n.

[meta]
name = "Русский"
code = "ru"

